<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<script src="script.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasza Randka ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f7abae,#fad0c4);
}

.container{
    background:#ff9a9e;
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4d88;
}

.info{
    font-size:22px;
    margin:15px 0;
}

#countdown{
    font-size:30px;
    color:#ff4d88;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>❤️ Nasze Spotkanie❤️</h1>

<div class="info">
    <p id="title"></p>
</div>

<div class="info" id="randkaBox" style="display:none;">
    <b>Randka:</b>
    <p id="Randka"></p>
</div>

<div class="info">
    <b>Termin:</b>
    <p id="date"></p>
</div>

<video
    id="loveVideo"
    autoplay
    muted
    loop
    playsinline
    width="500"
    style="border-radius:20px; max-width:50%; margin-top:10px;">
    <source src="happy.mp4" type="video/mp4">
    Twoja przeglądarka nie obsługuje filmów.
</video>



<script src="script.js"></script>

</body>
</html>
