<!DOCTYPE html>
<html lang="pl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zaproszenie ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🔒 Dostęp tylko dla jednej osoby</h1>

            <p class="subtitle">
                Aby przejść dalej musisz odpowiedzieć na jedno pytanie...
            </p>

            <h2>🐰 Jak ma na imię Twój królik?</h2>

            <input
                type="text"
                id="password"
                placeholder="Wpisz odpowiedź">

            <button onclick="checkPassword()">
                Dalej ❤️
            </button>

            <p id="error"></p>

        </div>

    </div>

    <script>function checkPassword(){

    const password = document.getElementById("password").value;

  if (password === "TY" || password === "Ty" || password === "ty") {
        window.location.href = "zagadka2.html";
    }

    else{

        document.getElementById("error").innerHTML =
            "No już kto jak kto ale TY tego nie wiesz";

    }

}</script>

</body>

</html>
